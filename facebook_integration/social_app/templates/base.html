<!-- ===== social_app/templates/base.html ===== -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Integración Facebook{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1877f2 0%, #42b72a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #1877f2 0%, #42b72a 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        main { padding: 40px; min-height: 400px; }
        .btn {
            display: inline-block;
            background: #1877f2;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: #42b72a; }
        .btn-facebook {
            background: #1877f2;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
        }
        .btn-facebook:before { content: "📘 "; }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .alert {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            border-left: 5px solid;
        }
        .alert-success {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .alert-error {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .form-group textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }
        .form-group textarea:focus {
            outline: none;
            border-color: #1877f2;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 {% block header %}Integración con Facebook{% endblock %}</h1>
            <p>Sistema de Gestión de Publicaciones Sociales</p>
        </header>
        
        <main>
            {% block content %}
            <!-- El contenido específico de cada página va aquí -->
            {% endblock %}
        </main>
        
        <footer>
            <p>© 2026 - Universidad Tecnológica de Hermosillo</p>
        </footer>
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
